services:
  - type: web
    name: resume-builder-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URL1
        sync: false
      - key: CLIENT_URL2
        sync: false
      - key: CORS_ALLOWED_ORIGIN_REGEX
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_ENABLED
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_QUEUE_NAME
        sync: false
      - key: EMAIL_RETRY_QUEUE_NAME
        sync: false
      - key: OTP_RATE_LIMIT_SECONDS
        sync: false
      - key: OTP_CACHE_SECONDS
        sync: false
